# 测试环境配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mianti_test
    username: root
    password: test
  redis:
    database: 0
    host: localhost
    port: 6379
    password: ''
  flyway:
    enabled: false
  # 排除测试环境中不可用的自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatPropertiesAutoConfiguration

# 关闭不必要的组件
hotkey:
  app-name: mianti-test
  caffeine-size: 1000
  push-period: 1000
  etcd-server: http://localhost:2379

nacos:
  config:
    enabled: false

sa-token:
  is-log: false

server:
  port: 8102
