name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  MAVEN_VERSION: '3.9'

jobs:
  test:
    name: Compile and Verify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mianti-next-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Compile
        run: mvn compile -DskipTests
        env:
          SENTRY_DSN: ""

  build:
    name: Build Application
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: mianti-next-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload J Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mianti-backend
          path: mianti-next-backend/target/*.jar

  build-frontend:
    name: Build Frontend
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mianti-next-frontend/package-lock.json

      - name: Install dependencies
        working-directory: mianti-next-frontend
        run: npm install

      - name: Build
        working-directory: mianti-next-frontend
        run: npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mianti-frontend
          path: mianti-next-frontend/dist/

  deploy:
    name: Deploy via Tailscale
    needs: [build, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: mianti-backend
          path: target/

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: mianti-frontend
          path: dist-frontend/

      - name: Set up Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy Backend to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar"
          target: "/opt/mianti/"

      - name: Deploy Frontend to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist-frontend/"
          target: "/opt/mianti/frontend/"

      - name: Restart Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/mianti
            JAR_FILE=$(ls -t *.jar | head -1)
            PID=$(pgrep -f "mianti-next-backend" || true)
            if [ ! -z "$PID" ]; then
              kill $PID
              sleep 5
            fi
            nohup java -jar -Dspring.profiles.active=prod $JAR_FILE > /var/log/mianti/app.log 2>&1 &
            echo "Deployment completed successfully"
