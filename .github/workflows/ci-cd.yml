name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  MAVEN_VERSION: '3.9'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: mianti_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Run Tests with Coverage
        run: mvn test -Dspring.profiles.active=test
        env:
          SENTRY_DSN: ""
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  build:
    name: Build Application
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload J Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mianti-backend
          path: target/*.jar

  build-frontend:
    name: Build Frontend
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mianti-next-frontend/package-lock.json

      - name: Install dependencies
        working-directory: mianti-next-frontend
        run: npm install

      - name: Build
        working-directory: mianti-next-frontend
        run: npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mianti-frontend
          path: mianti-next-frontend/dist/

  deploy:
    name: Deploy via Tailscale
    needs: [build, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: mianti-backend
          path: target/

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: mianti-frontend
          path: dist-frontend/

      - name: Set up Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy Backend to Server
        uses: appleboy/scp-action@master
        with:
          host: 100.98.245.102
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          source: "target/*.jar"
          target: "/opt/mianti/"

      - name: Deploy Frontend to Server
        uses: appleboy/scp-action@master
        with:
          host: 100.98.245.102
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          source: "dist-frontend/"
          target: "/opt/mianti/frontend/"

      - name: Restart Application
        uses: appleboy/ssh-action@master
        with:
          host: 100.98.245.102
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script: |
            cd /opt/mianti
            JAR_FILE=$(ls -t *.jar | head -1)
            PID=$(pgrep -f "mianti-next-backend" || true)
            if [ ! -z "$PID" ]; then
              kill $PID
              sleep 5
            fi
            nohup java -jar -Dspring.profiles.active=prod $JAR_FILE > /var/log/mianti/app.log 2>&1 &
            echo "Deployment completed successfully"
